# Maze-Hard 30x30 training config — BrierHalting
# Usage: python pretrain.py --config-name=cfg_maze_brier
#
# For augmented data, rebuild first:
#   cd dataset && python build_maze_dataset.py --aug --output_dir ../data/maze-30x30-hard-1k-aug

defaults:
  - arch: trm
  - _self_

hydra:
  output_subdir: null

project_name: SeniorProjectTRM

data_paths: ['data/maze-30x30-hard-1k']
data_paths_test: []

evaluators: []

# Override: enable BrierHalting
arch:
  loss:
    enable_brier_halting: true

# Hyperparams - Training (identical to BCE baseline for fair comparison)
global_batch_size: 64

epochs: 5000
eval_interval: 1000
checkpoint_every_eval: True

lr: 1e-4
lr_min_ratio: 1.0
lr_warmup_steps: 2000

beta1: 0.9
beta2: 0.95
weight_decay: 0.1
puzzle_emb_weight_decay: 0.1

puzzle_emb_lr: 1e-2

seed: 0
min_eval_interval: 0

ema: False
ema_rate: 0.999
freeze_weights: False

use_muon: False
muon_lr: 0.02
muon_momentum: 0.95
