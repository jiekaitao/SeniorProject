# Ablation Run 4: Softmax ONLY (BCE halting, softmax token loss, no monotonicity)
# Isolates the effect of switching stablemax -> softmax for token loss
# Usage: python pretrain.py --config-name=cfg_ablation_softmax_only +run_name=ABLATION_SOFTMAX_ONLY

defaults:
  - arch: trm
  - _self_

hydra:
  output_subdir: null

project_name: SeniorProjectTRM

data_paths: ['data/maze-30x30-hard-1k']
data_paths_test: []
evaluators: []

# Override: softmax only, keep BCE, no monotonicity
arch:
  loss:
    enable_brier_halting: false
    enable_monotonicity: false
    loss_type: softmax_cross_entropy
  L_cycles: 4

# Match original training hyperparams
global_batch_size: 128
epochs: 10000
eval_interval: 200
checkpoint_every_eval: True

lr: 1e-4
lr_min_ratio: 1.0
lr_warmup_steps: 2000

beta1: 0.9
beta2: 0.95
weight_decay: 1.0
puzzle_emb_weight_decay: 1.0
puzzle_emb_lr: 1e-4

seed: 0
min_eval_interval: 0

ema: True
ema_rate: 0.999
freeze_weights: False

use_muon: False
muon_lr: 0.02
muon_momentum: 0.95
