# Ablation: Full combo (Brier + softmax + monotonicity) - replicates RR_MODS_MODEL

defaults:
  - arch: trm
  - _self_

hydra:
  output_subdir: null

# Loss overrides
arch:
  loss:
    loss_type: softmax_cross_entropy
    enable_brier_halting: true
    enable_monotonicity: true

# Data
data_paths: ['data/maze-30x30-hard-1k']
data_paths_test: []
evaluators: []

# Training
project_name: SeniorProjectTRM
global_batch_size: 256
epochs: 5000
eval_interval: 500
checkpoint_every_eval: True

lr: 1e-4
lr_min_ratio: 1.0
lr_warmup_steps: 2000

beta1: 0.9
beta2: 0.95
weight_decay: 1.0

puzzle_emb_lr: 1e-4
puzzle_emb_weight_decay: 1.0

seed: 0
min_eval_interval: 0
ema: True
ema_rate: 0.999
freeze_weights: False
use_muon: False
